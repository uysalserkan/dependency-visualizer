apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: import-visualizer
  labels:
    app: import-visualizer
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: import-visualizer
      component: frontend
  template:
    metadata:
      labels:
        app: import-visualizer
        component: frontend
    spec:
      containers:
      - name: frontend
        image: import-visualizer-frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 80
          protocol: TCP
        
        env:
        - name: VITE_API_URL
          value: "http://backend:8000"
        
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
        
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
        
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: import-visualizer
  labels:
    app: import-visualizer
    component: frontend
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
  selector:
    app: import-visualizer
    component: frontend
