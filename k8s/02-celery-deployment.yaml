apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker
  namespace: import-visualizer
  labels:
    app: import-visualizer
    component: celery-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: import-visualizer
      component: celery-worker
  template:
    metadata:
      labels:
        app: import-visualizer
        component: celery-worker
    spec:
      containers:
      - name: celery-worker
        image: import-visualizer-backend:latest
        imagePullPolicy: IfNotPresent
        command: ["celery"]
        args:
          - "-A"
          - "app.celery_app"
          - "worker"
          - "--loglevel=info"
          - "--concurrency=4"
          - "--max-tasks-per-child=100"
        
        envFrom:
        - configMapRef:
            name: backend-config
        - secretRef:
            name: backend-secrets
        
        resources:
          requests:
            cpu: 1000m
            memory: 1Gi
          limits:
            cpu: 4000m
            memory: 4Gi
        
        volumeMounts:
        - name: cache
          mountPath: /data/cache
      
      volumes:
      - name: cache
        persistentVolumeClaim:
          claimName: backend-cache-pvc
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: celery-worker-hpa
  namespace: import-visualizer
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: celery-worker
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75
