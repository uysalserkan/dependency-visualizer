# Prometheus Configuration for Dependency Visualizer

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'dependency-visualizer'
    environment: 'production'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          # - 'alertmanager:9093'

# Load rules once and periodically evaluate them
rule_files:
  - "alerts/*.yml"

# Scrape configurations
scrape_configs:
  # Backend API metrics
  - job_name: 'dependency-visualizer-backend'
    static_configs:
      - targets: ['backend:8000']
        labels:
          service: 'backend'
          app: 'dependency-visualizer'
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
