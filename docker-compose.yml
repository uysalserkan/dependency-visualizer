services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      # Mount host filesystem for project analysis
      - ${HOME}:${HOME}:ro
    environment:
      - PYTHONUNBUFFERED=1
      # Extractor: auto (use Go if available), python, or go
      - EXTRACTOR_BACKEND=${EXTRACTOR_BACKEND:-auto}
      - GO_EXTRACTOR_PATH=/usr/local/bin/extractor
      - REDIS_ENABLED=${REDIS_ENABLED:-false}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/2}
      - RATE_LIMIT_STORAGE_URL=${RATE_LIMIT_STORAGE_URL:-redis://redis:6379/3}
      - CELERY_ENABLED=${CELERY_ENABLED:-false}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
    command: uv run uvicorn app.main:app --reload --host 0.0.0.0 --port 8000
    restart: unless-stopped
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: dependency-visualizer-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://backend:8000
    restart: unless-stopped

volumes:
  redis-data:
